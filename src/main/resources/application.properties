server.port=8084
spring.application.name=servico-usuarios

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:usuarios_db}
spring.datasource.username=${DB_USER:healthsys}
spring.datasource.password=${DB_PASS:healthsys}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

security.token.secret=${JWT_SECRET:healthsys-jwt-secret-key-deve-ser-trocada-em-producao}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.security.user.name=
spring.security.user.password=disabled

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

logging.level.com.healthsys.usuarios=DEBUG
logging.level.org.springframework.security=INFO
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
