# =========================================
# SERVIDOR
# =========================================
server.port=8084
spring.application.name=servico-usuarios

# =========================================
# BANCO DE DADOS
# =========================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:usuarios_db}
spring.datasource.username=${DB_USER:healthsys}
spring.datasource.password=${DB_PASS:healthsys}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.initialization-fail-timeout=60000

# =========================================
# JPA / HIBERNATE
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =========================================
# JWT
# =========================================
security.token.secret=${JWT_SECRET:healthsys-jwt-secret-key-deve-ser-trocada-em-producao}
jwt.expiration=${JWT_EXPIRATION:86400000}

# =========================================
# SPRING SECURITY
# =========================================
spring.security.user.name=
spring.security.user.password=disabled

# =========================================
# ACTUATOR / MONITORAMENTO
# =========================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# =========================================
# LOGS
# =========================================
logging.level.com.healthsys.usuarios=DEBUG
logging.level.org.springframework.security=INFO
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n