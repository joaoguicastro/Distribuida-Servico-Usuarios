# =========================================
# SERVIDOR
# =========================================
server.port=8084
spring.application.name=servico-usuarios

# =========================================
# BANCO DE DADOS
# =========================================
spring.datasource.url=jdbc:postgresql://localhost:5434/usuarios_db
spring.datasource.username=healthsys
spring.datasource.password=healthsys
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================================
# JPA / HIBERNATE
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Pode remover essa linha (o Hibernate j· detecta automaticamente)
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =========================================
# JWT
# =========================================
jwt.secret=${JWT_SECRET:healthsys-jwt-secret-key-deve-ser-trocada-em-producao}
jwt.expiration=${JWT_EXPIRATION:86400000}

# =========================================
# ACTUATOR / MONITORAMENTO
# =========================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# =========================================
# LOGS
# =========================================
logging.level.com.healthsys.usuarios=DEBUG
logging.level.org.springframework.security=INFO
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n